[pytest]
pythonpath = .
testpaths = tests
# Em testes: SEM rate limit (acelera), backend em memoria, mailer noop.
# Cada test_*.py override conforme precisa.
markers =
    smoke: roda contra backend de verdade (sandbox/staging). Skip por default.
# Smoke tests rodam só com `-m smoke`. Pra não rodar nunca por acidente em CI:
addopts = -m "not smoke"
