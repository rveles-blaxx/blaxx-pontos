# Sprint 4 (S4-2) · Alembic config
# Substitui o _apply_lightweight_migrations no startup do app — agora
# migrations sao versionadas, com upgrade/downgrade e historico explicito.
#
# Comandos basicos:
#   alembic upgrade head        # aplica todas pendentes (deploy)
#   alembic downgrade -1        # reverte 1 migration (rollback)
#   alembic revision --autogenerate -m "msg"  # cria nova
#   alembic history             # lista migrations
#   alembic current             # mostra versao atual do DB
[alembic]
script_location = migrations/alembic
prepend_sys_path = .
sqlalchemy.url = sqlite:///blaxx.db

# Em prod, sobrescrever via env: ALEMBIC_DB_URL ou DATABASE_URL
# (env.py prioriza essas duas).

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
