# =============================================================================
# Render.com · Infrastructure as Code
# =============================================================================
# Auto-deploys on every push to main.
# Native Python runtime (sem Docker) — evita problemas de build local.
# Render builda na cloud deles, instala deps, sobe gunicorn.
# =============================================================================
services:
  - type: web
    name: blaxx-pontos-backend
    runtime: python
    plan: free                         # 750h/mês = sempre ligado pra 1 serviço
    region: oregon                     # us-west; latência ~150ms pro BR
    branch: main
    autoDeploy: true                   # push → deploy

    # Render lê requirements.txt automaticamente, mas explicitamos:
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt

    # Sprint 1-2 (P0): aplica migrations ANTES do gunicorn iniciar. Em prod
    # o app NAO roda mais create_all() — o schema vem 100% do Alembic. Se
    # `alembic upgrade head` falhar, deploy aborta (status nao-zero), o
    # processo nao sobe e o trafego continua no release anterior.
    preDeployCommand: alembic upgrade head

    # gunicorn ouvindo na $PORT que o Render define
    startCommand: >-
      python -c 'from app import create_app; create_app()' &&
      gunicorn --bind 0.0.0.0:$PORT
               --workers 2
               --threads 4
               --timeout 60
               --access-logfile -
               --error-logfile -
               run:app

    # Healthcheck — /readyz é "esperto": valida DB + rotas críticas + JWT
    # registrados. Render Pro só promove o novo processo quando recebe 200,
    # então deploy quebrado (ex.: BadDsn no boot, blueprint não registrado)
    # fica em loop sem trocar tráfego. /health (uptime simples) fica como
    # liveness e pra monitores externos (statuspage, uptimerobot).
    healthCheckPath: /readyz

    # Env vars NÃO-secretas (settings sensíveis vão via dashboard como secrets)
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7

      - key: PORT
        value: 8080

      # MAILER: "console" (dev — loga em Render Logs) ou "resend" (prod)
      - key: MAILER
        value: console
      # Pra ativar envio real, mude MAILER=resend e preencha:
      - key: RESEND_API_KEY
        sync: false                    # re_xxxxx do dashboard.resend.com
      - key: EMAIL_FROM
        sync: false                    # "Blaxx Pontos <noreply@blaxxpontos.com.br>"

      - key: SMS_BACKEND
        value: console

      # Secrets — declarados com sync:false. Você define os VALORES no dashboard
      # do Render (Settings → Environment). Render não publica no git.
      - key: DATABASE_URL
        sync: false                    # postgresql://... do Neon

      - key: SECRET_KEY
        sync: false                    # python -c "import secrets;print(secrets.token_hex(32))"

      - key: JWT_SECRET_KEY
        sync: false                    # mesmo formato

      - key: CORS_ORIGINS
        sync: false                    # https://blaxx-pontos-app.netlify.app (o app.py já garante este domínio na allow-list)

      - key: FRONTEND_URL
        sync: false                    # https://blaxx-pontos-app.netlify.app

      # Google OAuth — Web Client ID do Google Cloud Console.
      # Backend aceita 3 nomes equivalentes (em ordem de prioridade):
      #   GOOGLE_WEB_CLIENT_ID > GOOGLE_CLIENT_ID
      # Recomendado usar GOOGLE_WEB_CLIENT_ID pra clareza, mas GOOGLE_CLIENT_ID
      # funciona como fallback (compat com render.yaml antigo).
      - key: GOOGLE_WEB_CLIENT_ID
        sync: false                    # 105341431878-xxx.apps.googleusercontent.com
      - key: GOOGLE_CLIENT_ID
        sync: false                    # fallback — pode deixar vazio se setar GOOGLE_WEB_CLIENT_ID
      - key: GOOGLE_IOS_CLIENT_ID
        sync: false                    # OBRIGATÓRIO p/ login Google no app Mac/iOS:
                                       # 105341431878-3msc2p3tjk3p5ro6i34d0b0qks3nf9dj.apps.googleusercontent.com
                                       # Sem isto, o id_token (aud=client iOS) é rejeitado:
                                       # "Token Google inválido ou expirado" (HTTP 401).

      # Twilio (opcional — só se SMS_BACKEND=twilio)
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_PHONE
        sync: false

      # PIX — chave recebedora (só usada pelo provider 'mock'/estático).
      # Default no código = 65975e3a-57b7-47a9-bfcb-13b3c11e011d.
      # ATENÇÃO: com PIX_PROVIDER=mercadopago esta chave é IGNORADA — o
      # dinheiro cai na conta do MP_ACCESS_TOKEN, não nesta chave.
      - key: PIX_MERCHANT_KEY
        sync: false                    # chave PIX aleatória/e-mail/CPF do recebedor

      # PIX provider — CRÍTICO. "mock" = simulador (homologação). "mercadopago"
      # = cobrança real. Mudar pra "mercadopago" só quando MP_ACCESS_TOKEN tiver
      # token de produção do MercadoPago Connect. Validado por env_schema.py.
      - key: PIX_PROVIDER
        value: mock
      - key: MP_ACCESS_TOKEN
        sync: false                    # APP_USR-xxx do MercadoPago (gated)

      # SEC-1: cookies httpOnly precisam Secure=True em produção (HTTPS).
      # Em dev local (HTTP), o browser permite cookies Secure mesmo assim em
      # localhost — mas pra defesa-em-profundidade, recomenda-se "1" sempre.
      - key: BLAXX_COOKIE_SECURE
        value: "1"

      # Sentry — observability, gated. Sem DSN setado, _init_sentry pula
      # silenciosamente. DSN inválido (placeholder) é REJEITADO pelo guard
      # (não derruba mais o boot, vide hotfix e5900d9 + ci.yml matrix).
      - key: SENTRY_DSN
        sync: false                    # https://KEY@oXXX.ingest.sentry.io/PROJECT_ID
      - key: SENTRY_TRACES_RATE
        value: "0.05"                  # 5% das transactions
      - key: RELEASE_VERSION
        sync: false                    # opcional; útil pra Sentry release tracking

      # Web Push (VAPID) — gated. Sem VAPID_PRIVATE_KEY, /push/subscribe
      # devolve 503 "gated" e o cliente trata sem erro. Vide LAUNCH_PENDING_CREDENTIALS.md §6.
      - key: VAPID_PRIVATE_KEY
        sync: false                    # gerar com: npx -y web-push generate-vapid-keys --json
      - key: VAPID_SUBJECT
        value: "mailto:contato@blaxxpontos.com.br"

      # FLASK_ENV — habilita strict mode do env_schema (CI-3). Em prod, envs
      # inválidas derrubam o boot ANTES de erro obscuro em runtime.
      - key: FLASK_ENV
        value: production
