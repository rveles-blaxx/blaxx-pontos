# CI pós-incident DSN (2026-06-24): roda pytest + boot test com matrix de envs
# problemáticas. Quebras como "SENTRY_DSN placeholder derruba o boot" ficam
# impossíveis de chegar em main — a matrix simula os 4 cenários reais do Render.
name: CI · backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (unit + integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run pytest
        env:
          SECRET_KEY: ci-only-secret-32chars-min-not-real
          JWT_SECRET_KEY: ci-only-secret-32chars-min-not-real
          MAILER: noop
          FLASK_ENV: development
          BLAXX_COOKIE_SECURE: '0'
        run: pytest -x --tb=short -q

  boot-matrix:
    name: boot ${{ matrix.case }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { case: 'no-sentry-dsn',    sentry_dsn: '',                              expect: 'success' }
          - { case: 'empty-sentry-dsn', sentry_dsn: ' ',                             expect: 'success' }
          - { case: 'placeholder-https', sentry_dsn: 'https://',                     expect: 'envfail' }
          - { case: 'placeholder-text',  sentry_dsn: '<your-dsn-here>',              expect: 'envfail' }
          - { case: 'malformed-no-at',   sentry_dsn: 'https://ingest.sentry.io/123', expect: 'envfail' }
          - { case: 'wrong-scheme',      sentry_dsn: 'ftp://key@host/1',             expect: 'envfail' }
          - { case: 'random-junk',       sentry_dsn: 'foobar',                       expect: 'envfail' }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Boot test
        env:
          SECRET_KEY: ci-only-secret-32chars-min-not-real
          JWT_SECRET_KEY: ci-only-secret-32chars-min-not-real
          MAILER: noop
          FLASK_ENV: production
          BLAXX_COOKIE_SECURE: '0'
          SENTRY_DSN: ${{ matrix.sentry_dsn }}
          PIX_PROVIDER: mock
          SMS_BACKEND: console
          EXPECT: ${{ matrix.expect }}
        run: |
          python -c "
          import os
          expect = os.environ['EXPECT']
          try:
              from app import create_app
              app = create_app()
              if expect == 'envfail':
                  raise SystemExit('FALHA: env_schema deveria ter rejeitado SENTRY_DSN inválido')
              rules = {str(r) for r in app.url_map.iter_rules()}
              required = {'/health', '/readyz', '/auth/login', '/auth/me',
                          '/auth/logout', '/auth/refresh',
                          '/push/subscribe', '/push/unsubscribe',
                          '/redeem/', '/transfer/'}
              missing = required - rules
              if missing:
                  raise SystemExit(f'rotas faltando: {sorted(missing)}')
              print(f'OK (success) - {len(rules)} rotas')
          except SystemExit:
              raise
          except Exception as exc:
              if expect != 'envfail':
                  raise
              msg = str(exc)
              if 'SENTRY_DSN' not in msg and 'Env' not in msg:
                  raise SystemExit(f'FALHA: erro nao menciona SENTRY_DSN/Env: {msg[:200]}')
              print(f'OK (envfail) - recusou boot: {type(exc).__name__}')
          "

  all-green:
    name: All checks green
    runs-on: ubuntu-latest
    needs: [pytest, boot-matrix]
    if: always()
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [ "${{ needs.pytest.result }}" != "success" ] || [ "${{ needs.boot-matrix.result }}" != "success" ]; then
            echo "::error::Algum job falhou — bloqueando merge"
            exit 1
          fi
          echo "Todos os checks verdes"
