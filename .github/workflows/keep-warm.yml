# Mantém o backend (Render free tier) acordado.
#
# O plano gratuito do Render hiberna a instância após ~15 min sem tráfego de
# entrada; o primeiro request depois disso leva 30–60s pra subir a VM, o que
# estourava o timeout de login no app Mac/iOS. Este workflow faz um GET no
# /health a cada ~10 min, o que conta como tráfego de entrada e impede o
# hibernamento.
#
# Observações:
#  - GitHub agenda crons em "best effort": sob carga pode atrasar alguns
#    minutos, por isso usamos 10 min (folga até os 15 min de hibernação).
#  - O GitHub desativa workflows agendados após 60 dias SEM nenhum commit no
#    repo. Qualquer push (incl. deploys) reseta essa contagem.
#  - 24/7 ≈ 720 h/mês, dentro das 750 h/mês gratuitas de uma única instância.

name: keep-warm

on:
  schedule:
    # A cada 10 minutos.
    - cron: "*/10 * * * *"
  # Permite disparar manualmente pela aba Actions do GitHub.
  workflow_dispatch:

# Evita filas longas: se um ping ainda estiver rodando, o próximo cancela.
concurrency:
  group: keep-warm
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping /health
        run: |
          echo "Pinging backend health endpoint…"
          # --max-time 90 tolera o cold start (subida da VM) sem falhar o job.
          # --retry repete em erro transitório enquanto a instância acorda.
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
                 --max-time 90 --retry 3 --retry-delay 15 --retry-all-errors \
                 https://blaxx-pontos-backend.onrender.com/health || echo "000")
          echo "HTTP status: $code"
          if [ "$code" != "200" ]; then
            echo "::warning::Health check returned $code (esperado 200)."
          fi
